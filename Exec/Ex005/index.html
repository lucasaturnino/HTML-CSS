    <h1>Principais formatações</h1>
<h2>Negrito/itálico</h2>
    <p>Para eu colocar termos em <b>negrito</b> eu uso a letra "B" ou também posso usar o termo <strong>strong</strong> desta forma</p>
<p>Ou eu posso colocar ela em <i>Itálico</i> utilizando a letra "i" ou o termo <em>em</em></p>
<h2>Marca texto</h2>
<p>Eu posso utilizar marcações com o termo <mark style="background-color: rgb(255, 0, 0);">mark</mark></p>
